<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuaWare Script OS v1</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #080808; /* Sade siyahımsı/Koyu füme arka plan */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Taşmayı engelle */
        }

        .intro-container {
            text-align: center;
        }

        .main-text {
            color: #f0f0f0; /* Tam beyaz değil, hafif gri/beyaz */
            font-size: 5rem; /* Büyük ve vurucu yazı boyutu */
            text-transform: uppercase; /* Bütün harfleri büyük yap */
            letter-spacing: 5px; /* Harf arası boşluk */
            margin: 0;
            
            /* Animasyon başlangıç ayarları (gizli) */
            opacity: 0;
            transform: scale(1.1) translateY(20px);
            
            /* Animasyon tetikleme (Kütüphanesiz CSS) */
            animation: sleekReveal 2.5s ease-out forwards;
        }

        /* "Script" kelimesi için özel parlayan yeşil tema */
        .script-part {
            color: #76ff03; /* O efsane neon yeşili koruyoruz */
            opacity: 0;
            display: inline-block; /* Animasyon için gerekli */
            animation: scriptFadeIn 1s ease-out 1.2s forwards; /* 1.2s gecikmeli başlar */
        }

        /* ==========================================
           🎯 CSS KEYFRAMES (ANİMASYON MOTORU)
           ========================================== */

        /* Genel yazının gelişi (Ölçeklenme + Opaklık + Yukarı süzülme) */
        @keyframes sleekReveal {
            0% { 
                opacity: 0; 
                transform: scale(1.1) translateY(20px); 
                letter-spacing: 20px; /* Çok açık başlar */
            }
            40% { 
                opacity: 1; 
                transform: scale(1) translateY(0); 
                letter-spacing: 8px; /* Daralmaya başlar */
            }
            100% { 
                opacity: 1; 
                transform: scale(1) translateY(0); 
                letter-spacing: 5px; /* Final boşluk */
            }
        }

        /* "Script" kelimesinin sonradan belirmesi ve neon parlaması */
        @keyframes scriptFadeIn {
            0% { 
                opacity: 0; 
                transform: translateX(15px); /* Hafif sağdan gelir */
                text-shadow: 0 0 0px #76ff03;
            }
            100% { 
                opacity: 1; 
                transform: translateX(0); 
                /* Efsanevi Neon Parlaması (Glow Effect) */
                text-shadow: 0 0 10px #76ff03, 0 0 20px #76ff03, 0 0 30px #76ff03;
            }
        }
    </style>
</head>
<body>
    <div class="intro-container">
        <h1 class="main-text">LuaWare <span class="script-part">Script</span></h1>
    </div>
</body>
</html>
