<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuaWare Script | Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505; /* Çok derin siyah */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
        }

        /* ==========================================
           🌌 ARKA PLAN ANİMASYONU (PARTICLES)
           ========================================== */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* Hafif bir tarama çizgisi efekti */
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }

        /* Akan yeşil ışıklar */
        .particle {
            position: absolute;
            background: #76ff03;
            border-radius: 50%;
            opacity: 0.3;
            filter: blur(2px);
            animation: moveParticles 15s linear infinite;
        }

        @keyframes moveParticles {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* ==========================================
           ✍️ ANA YAZI VE EFEKTLER
           ========================================== */
        .content {
            position: relative;
            z-index: 10; /* Yazı her şeyin üstünde */
            text-align: center;
        }

        .main-text {
            color: #ffffff;
            font-size: 6rem;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin: 0;
            opacity: 0;
            filter: blur(10px);
            animation: revealText 2s ease-out forwards;
        }

        .script-part {
            color: #76ff03;
            text-shadow: 0 0 15px #76ff03, 0 0 30px #76ff03;
            display: inline-block;
            animation: glitch 3s infinite;
        }

        /* Yazı Açılış Animasyonu */
        @keyframes revealText {
            0% { opacity: 0; filter: blur(20px); transform: scale(0.8); letter-spacing: 30px; }
            100% { opacity: 1; filter: blur(0); transform: scale(1); letter-spacing: 10px; }
        }

        /* Hafif Glitch (Bozulma) Efekti */
        @keyframes glitch {
            0% { transform: translate(0); }
            2% { transform: translate(-2px, 2px); }
            4% { transform: translate(-2px, -2px); }
            6% { transform: translate(2px, 2px); }
            8% { transform: translate(2px, -2px); }
            10% { transform: translate(0); }
            100% { transform: translate(0); }
        }

        /* Alt Yazı */
        .sub-text {
            color: #555;
            font-size: 1rem;
            margin-top: 20px;
            letter-spacing: 3px;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 2s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-animation" id="particles"></div>

    <div class="content">
        <h1 class="main-text">LuaWare <span class="script-part">Script</span></h1>
        <p class="sub-text">Developed by Noxyorj</p>
    </div>

    <script>
        // Arka planda rastgele parçacıklar oluşturma (Saf JavaScript)
        const particleContainer = document.getElementById('particles');
        const particleCount = 40;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            // Rastgele boyut
            const size = Math.random() * 4 + 1 + 'px';
            particle.style.width = size;
            particle.style.height = size;
            
            // Rastgele pozisyon
            particle.style.left = Math.random() * 100 + 'vw';
            
            // Rastgele hız ve gecikme
            particle.style.animationDuration = Math.random() * 10 + 5 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            
            particleContainer.appendChild(particle);
        }
    </script>
</body>
</html>
