<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuaWare | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #111; --green: #76ff03; --text: #fff; --sub: #888; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* Tertemiz Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; border-bottom: 1px solid #1a1a1a; background: rgba(5,5,5,0.9); }
        .logo { font-size: 1.5rem; font-weight: 900; color: #fff; text-decoration: none; letter-spacing: 2px; }
        .logo span { color: var(--green); }
        
        /* Butonlar */
        .btn-login { background: #5865F2; color: #fff; border: none; padding: 12px 24px; border-radius: 6px; font-weight: 600; cursor: pointer; text-decoration: none; transition: 0.2s; }
        .btn-login:hover { background: #4752C4; }
        .btn-logout { background: transparent; border: 1px solid #333; color: #fff; padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; display: none; font-weight: 600;}
        .btn-logout:hover { border-color: #ff3333; color: #ff3333; }

        /* Giriş Yapılmamış Ekran */
        .hero { text-align: center; margin-top: 15vh; }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; font-weight: 900; }
        .hero p { color: var(--sub); font-size: 1.2rem; }

        /* SADE DASHBOARD (Kullanıcı Paneli) */
        .dashboard { display: none; max-width: 450px; margin: 10vh auto; background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid #1a1a1a; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--green); margin-bottom: 20px; }
        .username { font-size: 1.8rem; margin: 0 0 5px 0; }
        .discord-id { color: var(--sub); font-size: 0.9rem; margin-bottom: 30px; font-family: monospace; }
        
        .key-box { background: rgba(118,255,3,0.05); border: 1px dashed var(--green); padding: 20px; font-family: monospace; font-size: 1.4rem; color: var(--green); border-radius: 8px; margin-bottom: 20px; letter-spacing: 2px; }
        .copy-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 15px; width: 100%; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .copy-btn:hover { background: #222; border-color: var(--green); color: var(--green); }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo">LUA<span>WARE</span></a>
        <div>
            <a href="https://discord.com/oauth2/authorize?client_id=1491071700715048970&response_type=token&redirect_uri=https%3A%2F%2Fluaware-web.vercel.app&scope=identify" class="btn-login" id="loginBtn">Discord ile Giriş Yap</a>
            <button class="btn-logout" id="logoutBtn">Çıkış Yap</button>
        </div>
    </header>

    <div class="hero" id="hero">
        <h1>Premium <span>Erişim</span></h1>
        <p>Lisans anahtarlarına ulaşmak için Discord ile yetkilendir.</p>
    </div>

    <div class="dashboard" id="dashboard">
        <img src="https://cdn.discordapp.com/embed/avatars/0.png" class="profile-pic" id="userAvatar" alt="Profil">
        <h2 class="username" id="userName">Yükleniyor...</h2>
        <p class="discord-id" id="dashId">ID: Bekleniyor</p>
        
        <div style="text-align: left; font-size: 0.8rem; color: var(--sub); margin-bottom: 8px; text-transform: uppercase;">Aktif Anahtarınız</div>
        <div class="key-box">LUAWARE-NOXY-987X-G6F2-PLQ1</div>
        <button class="copy-btn">Anahtarı Kopyala</button>
    </div>

    <script>
        window.onload = async () => {
            // Discord'dan gelen linkin içindeki gizli Token'ı yakala
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const [accessToken, tokenType] = [fragment.get('access_token'), fragment.get('token_type')];

            if (accessToken) {
                // Adam başarıyla giriş yaptıysa ekranları değiştir
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                document.getElementById('hero').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';

                try {
                    // Discord API'ye bağlanıp adamın GERÇEK verilerini çek
                    const res = await fetch('https://discord.com/api/users/@me', {
                        headers: { authorization: `${tokenType} ${accessToken}` }
                    });
                    const user = await res.json();

                    // Çekilen bilgileri Sade Panel'e yazdır
                    document.getElementById('userName').innerText = user.username;
                    document.getElementById('dashId').innerText = `Discord ID: ${user.id}`;
                    
                    const avatarUrl = user.avatar 
                        ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` 
                        : 'https://cdn.discordapp.com/embed/avatars/0.png';
                    document.getElementById('userAvatar').src = avatarUrl;

                } catch (err) {
                    console.error("Veri çekilemedi:", err);
                }
            }

            // Çıkış Yap
            document.getElementById('logoutBtn').addEventListener('click', () => {
                window.location.href = "https://luaware-web.vercel.app"; // Temiz linke dön
            });
        };
    </script>
</body>
</html>
