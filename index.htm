<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuaWare | Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #0d0d0d; --green: #76ff03; --text: #fff; --sub: #888; }
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }
        
        /* ❄️ KAR TOPU EFEKTİ */
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .snowball { position: absolute; background: rgba(118, 255, 3, 0.15); border-radius: 50%; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(100vh); opacity: 0; } }

        /* 🎬 INTRO EKRANI */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg); display: flex; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .intro-title { font-size: 4rem; font-weight: 900; letter-spacing: 10px; margin: 0; opacity: 0; animation: revealIntro 2s ease forwards; text-transform: uppercase;}
        .intro-title span { color: var(--green); }
        @keyframes revealIntro { 0% { opacity: 0; filter: blur(10px); transform: scale(0.9); } 100% { opacity: 1; filter: blur(0); transform: scale(1); } }

        /* ANA SİTE KATMANI */
        #main-wrapper { position: relative; z-index: 10; display: none; opacity: 0; transition: opacity 0.5s ease; }
        #main-wrapper.active { display: block; opacity: 1; }

        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; border-bottom: 1px solid #1a1a1a; background: rgba(5,5,5,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 50;}
        .logo { font-size: 1.5rem; font-weight: 900; color: #fff; text-decoration: none; letter-spacing: 2px; }
        .logo span { color: var(--green); }
        
        .btn-login { background: #5865F2; color: #fff; border: none; padding: 12px 24px; border-radius: 6px; font-weight: 600; cursor: pointer; text-decoration: none; transition: 0.2s; display: none; }
        .btn-login:hover { background: #4752C4; }
        .btn-logout { background: transparent; border: 1px solid #333; color: #ff3333; padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; display: none; font-weight: 600;}
        .btn-logout:hover { border-color: #ff3333; background: rgba(255, 51, 51, 0.1); }

        /* GİRİŞ EKRANI (HERO) */
        .hero { text-align: center; margin-top: 20vh; display: none; animation: slideUp 0.8s ease forwards;}
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; font-weight: 900; }
        .hero span { color: var(--green); }
        .hero p { color: var(--sub); font-size: 1.2rem; }

        /* YENİ NESİL PANEL (DASHBOARD) */
        .dashboard { display: none; max-width: 600px; margin: 8vh auto; background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid #1a1a1a; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); animation: slideUp 0.8s ease forwards; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .profile-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #1a1a1a; padding-bottom: 30px; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--green); }
        .user-info { text-align: left; }
        .username { font-size: 1.8rem; margin: 0 0 5px 0; font-weight: 900;}
        .discord-id { color: var(--sub); font-size: 0.9rem; font-family: monospace; }
        
        .keys-section { text-align: left; }
        .section-title { font-size: 0.9rem; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; font-weight: 600;}
        
        .key-card { background: #080808; border: 1px solid #222; padding: 20px; border-radius: 12px; margin-bottom: 15px; position: relative; transition: 0.3s; }
        .key-card:hover { border-color: var(--green); box-shadow: 0 0 15px rgba(118,255,3,0.1); }
        .key-tier { position: absolute; top: 15px; right: 20px; background: rgba(118,255,3,0.1); color: var(--green); padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: 900;}
        .key-value { font-family: monospace; font-size: 1.3rem; color: #fff; margin-top: 15px; letter-spacing: 2px; }
        
        .copy-btn { margin-top: 15px; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 12px; width: 100%; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .copy-btn:hover { background: var(--green); border-color: var(--green); color: #000; }
    </style>
</head>
<body>

    <div id="particles"></div>

    <div id="intro-screen">
        <h1 class="intro-title">LuaWare <span>Script</span></h1>
    </div>

    <div id="main-wrapper">
        <header>
            <a href="#" class="logo">LUA<span>WARE</span></a>
            <div>
                <a href="https://discord.com/oauth2/authorize?client_id=1491071700715048970&response_type=token&redirect_uri=https%3A%2F%2Fluaware-web.vercel.app&scope=identify" class="btn-login" id="loginBtn">Discord ile Giriş Yap</a>
                <button class="btn-logout" id="logoutBtn">Çıkış Yap</button>
            </div>
        </header>

        <div class="hero" id="hero">
            <h1>Sisteme <span>Erişim</span> Sağla</h1>
            <p>Satın aldığın lisans anahtarlarına erişmek için Discord ile yetkilendir.</p>
        </div>

        <div class="dashboard" id="dashboard">
            <div class="profile-container">
                <img src="https://cdn.discordapp.com/embed/avatars/0.png" class="profile-pic" id="userAvatar" alt="Profil">
                <div class="user-info">
                    <h2 class="username" id="userName">Yükleniyor...</h2>
                    <div class="discord-id" id="dashId">ID: Bekleniyor</div>
                </div>
            </div>
            
            <div class="keys-section">
                <div class="section-title">Kayıtlı Lisans Anahtarların</div>
                
                <div class="key-card">
                    <div class="key-tier">PREMIUM LIFETIME</div>
                    <div style="font-size: 0.8rem; color: #888;">Anahtar:</div>
                    <div class="key-value" id="userKey">LUAWARE-YÜKLENİYOR...</div>
                    <button class="copy-btn" id="copyKeyBtn">Anahtarı Kopyala</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ❄️ Kar Topu Motoru
        const pContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'snowball';
            const size = Math.random() * 4 + 2 + 'px';
            p.style.width = size; p.style.height = size;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = Math.random() * 10 + 10 + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            pContainer.appendChild(p);
        }

        window.onload = async () => {
            // 🎬 Intro Kontrolü (Sadece ilk girişte oynatılır)
            const intro = document.getElementById('intro-screen');
            const main = document.getElementById('main-wrapper');
            
            setTimeout(() => {
                intro.style.opacity = '0'; intro.style.visibility = 'hidden';
                setTimeout(() => { main.classList.add('active'); }, 800);
            }, 2500);

            // ==========================================
            // 🧠 OTOMATİK GİRİŞ VE HATIRLAMA (LOCAL STORAGE)
            // ==========================================
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            let urlToken = fragment.get('access_token');
            let tokenType = fragment.get('token_type');

            // Eğer URL'de token varsa (Discord'dan yeni döndüyse), belleğe kaydet!
            if (urlToken) {
                localStorage.setItem('discord_token', urlToken);
                localStorage.setItem('discord_token_type', tokenType);
                // URL'yi temizle ki link şekilli dursun, token gözükmesin
                window.history.replaceState(null, null, window.location.pathname);
            }

            // Bellekten (LocalStorage) token'ı çek (Adam siteyi kapatıp açsa bile burada kalır)
            const savedToken = localStorage.getItem('discord_token');
            const savedType = localStorage.getItem('discord_token_type');

            if (savedToken) {
                try {
                    // Token ile Discord'a bağlan
                    const res = await fetch('https://discord.com/api/users/@me', {
                        headers: { authorization: `${savedType} ${savedToken}` }
                    });
                    
                    if (!res.ok) throw new Error("Token süresi dolmuş"); // Eğer token eskiyse hataya düşer

                    const user = await res.json();

                    // Giriş başarılı! Butonları ve panelleri ayarla
                    document.getElementById('logoutBtn').style.display = 'inline-block';
                    document.getElementById('dashboard').style.display = 'block';

                    // Verileri Panele Yaz
                    document.getElementById('userName').innerText = user.username;
                    document.getElementById('dashId').innerText = `Discord ID: ${user.id}`;
                    
                    const avatarUrl = user.avatar 
                        ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` 
                        : 'https://cdn.discordapp.com/embed/avatars/0.png';
                    document.getElementById('userAvatar').src = avatarUrl;

                    // 🔑 MOCK-UP: Adamın ID'sine Özel Benzersiz Key Üretimi
                    // (Bu kısım harbi veritabanı kurulana kadar çalışacak akıllı algoritma)
                    const uniqueHash = user.id.slice(-6); // ID'nin son 6 hanesi
                    const customKey = `LUAWARE-${user.username.substring(0,3).toUpperCase()}-${uniqueHash}-X99`;
                    const keyElement = document.getElementById('userKey');
                    keyElement.innerText = customKey;

                    // Kopyala Butonu İşlevi
                    document.getElementById('copyKeyBtn').addEventListener('click', (e) => {
                        navigator.clipboard.writeText(customKey);
                        e.target.innerText = "Kopyalandı! ✔";
                        e.target.style.background = "#76ff03";
                        e.target.style.color = "#000";
                        setTimeout(() => {
                            e.target.innerText = "Anahtarı Kopyala";
                            e.target.style.background = "#1a1a1a";
                            e.target.style.color = "#fff";
                        }, 2000);
                    });

                } catch (err) {
                    console.error("Giriş hatası:", err);
                    // Token bozulmuşsa belleği temizle ve giriş butonunu göster
                    localStorage.removeItem('discord_token');
                    localStorage.removeItem('discord_token_type');
                    document.getElementById('loginBtn').style.display = 'inline-block';
                    document.getElementById('hero').style.display = 'block';
                }
            } else {
                // Bellekte token yoksa direkt giriş ekranını göster
                document.getElementById('loginBtn').style.display = 'inline-block';
                document.getElementById('hero').style.display = 'block';
            }

            // ÇIKIŞ YAP (Belleği temizle)
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('discord_token');
                localStorage.removeItem('discord_token_type');
                window.location.reload(); // Sayfayı yenile
            });
        };
    </script>
</body>
</html>
