<!DOCTYPE html> 
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuaWare | Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #0d0d0d; --green: #76ff03; --text: #fff; --sub: #888; }
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }
        
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .snowball { position: absolute; background: rgba(118, 255, 3, 0.15); border-radius: 50%; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(100vh); opacity: 0; } }

        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; border-bottom: 1px solid #1a1a1a; background: rgba(5,5,5,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 50;}
        .logo { font-size: 1.5rem; font-weight: 900; color: #fff; text-decoration: none; letter-spacing: 2px; }
        .logo span { color: var(--green); }
        
        .btn-login { background: #5865F2; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; text-decoration: none; transition: 0.2s; }
        .btn-login:hover { background: #4752C4; }

        .profile-wrapper { position: relative; display: none; } 
        .user-profile { display: flex; align-items: center; gap: 12px; background: #111; padding: 5px 15px 5px 5px; border-radius: 30px; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .user-profile:hover { border-color: var(--green); }
        .user-profile img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--green); }
        .user-profile .username { font-weight: 600; font-size: 0.9rem; user-select: none; padding-right: 10px;}

        .dropdown-menu { position: absolute; top: 55px; right: 0; width: 160px; background: #111; border: 1px solid #222; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.3s ease; box-shadow: 0 10px 25px rgba(0,0,0,0.8); }
        .dropdown-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-menu button { background: none; border: none; color: #fff; text-align: left; padding: 12px 15px; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #1a1a1a; }
        .dropdown-menu button:hover { background: var(--green); color: #000; padding-left: 20px; }
        .dropdown-menu button:last-child { border-bottom: none; color: #ff3333; }
        .dropdown-menu button:last-child:hover { background: #ff3333; color: #fff; }

        .view-container { position: relative; z-index: 10; animation: slideUp 0.8s ease forwards; display: none; }
        .view-container.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .hero { text-align: center; margin-top: 20vh; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; font-weight: 900; }
        .hero span { color: var(--green); }
        .hero p { color: var(--sub); font-size: 1.2rem; }

        .dashboard { max-width: 600px; margin: 8vh auto; background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid #1a1a1a; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .profile-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #1a1a1a; padding-bottom: 30px; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--green); }
        .user-info { text-align: left; }
        .username-dash { font-size: 1.8rem; margin: 0 0 5px 0; font-weight: 900;}
        .discord-id { color: var(--sub); font-size: 0.9rem; font-family: monospace; }
        
        .keys-section { text-align: left; }
        .section-title { font-size: 0.9rem; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; font-weight: 600;}
        .key-card { background: #080808; border: 1px solid #222; padding: 20px; border-radius: 12px; margin-bottom: 15px; position: relative; transition: 0.3s; }
        .key-card:hover { border-color: var(--green); box-shadow: 0 0 15px rgba(118,255,3,0.1); }
        .key-tier { position: absolute; top: 15px; right: 20px; background: rgba(118,255,3,0.1); color: var(--green); padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: 900;}
        .key-value { font-family: monospace; font-size: 1.2rem; color: #fff; margin-top: 15px; letter-spacing: 2px; }
        .copy-btn { margin-top: 15px; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 12px; width: 100%; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .copy-btn:hover { background: var(--green); border-color: var(--green); color: #000; }
        
        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.8s ease, visibility 0.8s ease; }
        .intro-title { font-size: 4rem; font-weight: 900; letter-spacing: 15px; opacity: 0; animation: reveal 2.5s ease forwards; text-transform: uppercase;}
        .intro-title span { color: var(--green); text-shadow: 0 0 20px var(--green); }
        @keyframes reveal { 0% { opacity: 0; filter: blur(15px); transform: scale(0.8); } 100% { opacity: 1; filter: blur(0); transform: scale(1); } }
        
        #main-site-content { opacity: 0; transition: opacity 0.5s ease; }
        #main-site-content.active { opacity: 1; }
    </style>
</head>
<body>
    <div id="particles"></div>
    <div id="intro-screen"><h1 class="intro-title">LuaWare <span>Script</span></h1></div>

    <div id="main-site-content">
        <header>
            <a href="#" class="logo" id="logoBtn">LUA<span>WARE</span></a>
            <div>
                <a href="https://discord.com/oauth2/authorize?client_id=1491071700715048970&response_type=token&redirect_uri=https%3A%2F%2Fluaware-web.vercel.app&scope=identify" class="btn-login" id="loginBtn">Discord ile Giriş Yap</a>
                
                <div class="profile-wrapper" id="profileWrapper">
                    <div class="user-profile" id="userProfileBtn">
                        <img src="https://cdn.discordapp.com/embed/avatars/0.png" id="topAvatar" alt="Profil">
                        <span class="username" id="topUsername">Yükleniyor...</span>
                    </div>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <button id="navHome">🏠 Ana Sayfa</button>
                        <button id="navKeys">🔑 Keylerim</button>
                        <button id="navLogout">Çıkış Yap</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="view-container hero active" id="heroView">
            <h1>Sisteme <span>Erişim</span> Sağla</h1>
            <p>Satın aldığın lisans anahtarlarına erişmek için Discord ile yetkilendir.</p>
        </div>

        <div class="view-container dashboard" id="dashboardView">
            <div class="profile-container">
                <img src="https://cdn.discordapp.com/embed/avatars/0.png" class="profile-pic" id="dashAvatar" alt="Profil">
                <div class="user-info">
                    <h2 class="username-dash" id="dashUsername">Yükleniyor...</h2>
                    <div class="discord-id" id="dashId">ID: Bekleniyor</div>
                </div>
            </div>
            
            <div class="keys-section">
                <div class="section-title">MongoDB'den Çekilen Veriler</div>
                <div class="key-card">
                    <div class="key-tier">PREMIUM LISANS</div>
                    <div style="font-size: 0.8rem; color: #888;">Anahtar:</div>
                    <div class="key-value" id="userKey">Sorgulanıyor...</div> 
                    <button class="copy-btn" id="copyKeyBtn">Anahtarı Kopyala</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const pContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'snowball';
            const size = Math.random() * 4 + 2 + 'px';
            p.style.width = size; p.style.height = size;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = Math.random() * 10 + 10 + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            pContainer.appendChild(p);
        }

        window.onload = async () => {
            const loginBtn = document.getElementById('loginBtn');
            const profileWrapper = document.getElementById('profileWrapper');
            const dropdownMenu = document.getElementById('dropdownMenu');
            const heroView = document.getElementById('heroView');
            const dashboardView = document.getElementById('dashboardView');
            const introScreen = document.getElementById('intro-screen');
            const mainContent = document.getElementById('main-site-content');

            setTimeout(() => {
                introScreen.style.opacity = '0';
                introScreen.style.visibility = 'hidden';
                setTimeout(() => { mainContent.classList.add('active'); }, 800);
            }, 2500);

            const fragment = new URLSearchParams(window.location.hash.slice(1));
            let urlToken = fragment.get('access_token');
            let tokenType = fragment.get('token_type');

            if (urlToken) {
                localStorage.setItem('discord_token', urlToken);
                localStorage.setItem('discord_token_type', tokenType);
                window.history.replaceState(null, null, window.location.pathname);
            }

            const savedToken = localStorage.getItem('discord_token');
            const savedType = localStorage.getItem('discord_token_type');

            if (savedToken) {
                try {
                    const res = await fetch('https://discord.com/api/users/@me', {
                        headers: { authorization: `${savedType} ${savedToken}` }
                    });
                    if (!res.ok) throw new Error("Token süresi dolmuş"); 
                    const user = await res.json();

                    loginBtn.style.display = 'none';
                    profileWrapper.style.display = 'block';

                    const avatarUrl = user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png';
                    
                    document.getElementById('topAvatar').src = avatarUrl;
                    document.getElementById('topUsername').innerText = user.username;
                    document.getElementById('dashAvatar').src = avatarUrl;
                    document.getElementById('dashUsername').innerText = user.username;
                    document.getElementById('dashId').innerText = `Discord ID: ${user.id}`;

                    // İŞTE O UNUTTUĞUM SİHİRLİ KOMUT: Vercel Backend'e gidip veriyi çeker!
                    try {
                        const apiRes = await fetch(`/api/user?id=${user.id}`);
                        const apiData = await apiRes.json();
                        document.getElementById('userKey').innerText = apiData.key || "Kayıtlı Key Yok";
                    } catch (err) {
                        document.getElementById('userKey').innerText = "Bağlantı Hatası!";
                    }

                } catch (err) {
                    localStorage.removeItem('discord_token');
                    loginBtn.style.display = 'inline-block';
                }
            } else {
                loginBtn.style.display = 'inline-block';
            }

            document.getElementById('userProfileBtn').addEventListener('click', () => {
                dropdownMenu.classList.toggle('show');
            });

            window.addEventListener('click', (e) => {
                if (!profileWrapper.contains(e.target)) dropdownMenu.classList.remove('show');
            });

            document.getElementById('navKeys').addEventListener('click', () => {
                heroView.classList.remove('active');
                dashboardView.classList.add('active');
                dropdownMenu.classList.remove('show');
            });

            const goHome = () => {
                dashboardView.classList.remove('active');
                heroView.classList.add('active');
                dropdownMenu.classList.remove('show');
            };
            document.getElementById('navHome').addEventListener('click', goHome);
            document.getElementById('logoBtn').addEventListener('click', goHome);

            document.getElementById('navLogout').addEventListener('click', () => {
                localStorage.removeItem('discord_token');
                window.location.reload();
            });
            
            document.getElementById('copyKeyBtn').addEventListener('click', (e) => {
                const keyText = document.getElementById('userKey').innerText;
                navigator.clipboard.writeText(keyText);
                e.target.innerText = "Kopyalandı! ✔";
                e.target.style.background = "#76ff03";
                e.target.style.color = "#000";
                setTimeout(() => {
                    e.target.innerText = "Anahtarı Kopyala";
                    e.target.style.background = "#1a1a1a";
                    e.target.style.color = "#fff";
                }, 2000);
            });
        };
    </script>
</body>
</html>
