<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuaWare | Premium Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --main: #ffcc00; /* Kraytex/LuaWare Sarısı */
            --dark: #111;
            --text: #fff;
            --sub: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

        /* 🎬 DEV AÇILIŞ VE DİL SEÇİM EKRANI */
        #intro-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s ease-in-out;
        }
        .huge-logo {
            font-family: 'Orbitron', sans-serif; font-size: 8vw; font-weight: 900; color: var(--main); letter-spacing: 20px; text-shadow: 0 0 30px rgba(255, 204, 0, 0.5);
            animation: zoomIn 1.5s cubic-bezier(0.1, 1, 0.1, 1) forwards;
        }
        .huge-logo span { color: #fff; }
        @keyframes zoomIn { 0% { transform: scale(0.1); opacity: 0; filter: blur(10px); } 100% { transform: scale(1); opacity: 1; filter: blur(0); } }

        .lang-selector {
            margin-top: 50px; display: flex; gap: 20px; opacity: 0; animation: fadeUp 1s 1.5s forwards;
        }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(-20px); } }
        .lang-btn {
            background: transparent; border: 2px solid var(--main); color: var(--main); padding: 15px 40px; font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; position: relative; overflow: hidden;
        }
        .lang-btn:hover { background: var(--main); color: #000; box-shadow: 0 0 20px var(--main); }

        /* 📦 ESP CORNER BOX (PROFESYONEL UI) */
        .esp-box {
            position: relative; background: rgba(17, 17, 17, 0.8); border: 1px solid #222; padding: 30px; margin: 20px; transition: 0.3s;
        }
        .esp-box::before { content: ''; position: absolute; top: -2px; left: -2px; width: 15px; height: 15px; border-top: 2px solid var(--main); border-left: 2px solid var(--main); }
        .esp-box::after { content: ''; position: absolute; bottom: -2px; right: -2px; width: 15px; height: 15px; border-bottom: 2px solid var(--main); border-right: 2px solid var(--main); }
        .corner-tr { position: absolute; top: -2px; right: -2px; width: 15px; height: 15px; border-top: 2px solid var(--main); border-right: 2px solid var(--main); }
        .corner-bl { position: absolute; bottom: -2px; left: -2px; width: 15px; height: 15px; border-bottom: 2px solid var(--main); border-left: 2px solid var(--main); }
        .esp-box:hover { background: #151515; border-color: #333; box-shadow: inset 0 0 20px rgba(255, 204, 0, 0.05); }

        /* 🖥️ ANA ARAYÜZ */
        #main-ui { display: none; opacity: 0; transition: opacity 1s; padding-top: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; border-bottom: 1px solid #222; }
        .logo-small { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; color: #fff; text-decoration: none; }
        .logo-small span { color: var(--main); }

        .auth-btn { background: var(--main); color: #000; border: none; padding: 12px 25px; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1rem; cursor: pointer; transition: 0.3s; text-decoration: none; }
        .auth-btn:hover { box-shadow: 0 0 20px rgba(255, 204, 0, 0.6); transform: scale(1.05); }

        .user-profile { display: none; align-items: center; gap: 15px; }
        .user-profile img { width: 45px; height: 45px; border-radius: 0; border: 2px solid var(--main); }
        
        /* DASHBOARD GRID */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1300px; margin: 60px auto; padding: 0 20px; }
        
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 4rem; font-weight: 900; color: var(--main); margin-bottom: 10px; }
        .stat-label { font-size: 1.2rem; color: var(--sub); text-transform: uppercase; letter-spacing: 2px; font-weight: 700;}

        /* 🔥 MONGODB KEY GÖSTERİM ALANI */
        .key-action-btn { background: transparent; border: 1px solid var(--main); color: var(--main); padding: 15px; width: 100%; margin-top: 20px; font-family: 'Orbitron', sans-serif; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .key-action-btn:hover { background: var(--main); color: #000; }

        #mongoKeyResult { margin-top: 20px; padding: 15px; background: #000; border: 1px dashed var(--main); color: var(--main); font-family: monospace; font-size: 1.2rem; text-align: center; display: none; word-break: break-all; }
        
        /* ANIMASYONLU GEÇİŞ OKLARI (Senin İstediğin) */
        .arrow-transition { display: inline-block; transition: 0.3s; }
        .key-action-btn:hover .arrow-transition { transform: translateX(10px); }

    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="huge-logo">LUA<span>WARE</span></div>
        <div class="lang-selector">
            <button class="lang-btn" onclick="enterSite('TR')">TÜRKÇE</button>
            <button class="lang-btn" onclick="enterSite('EN')">ENGLISH</button>
        </div>
    </div>

    <div id="main-ui">
        <header>
            <a href="#" class="logo-small">LUA<span>WARE</span></a>
            
            <a href="https://discord.com/oauth2/authorize?client_id=1491071700715048970&response_type=token&redirect_uri=https%3A%2F%2Fluaware-web.vercel.app&scope=identify" class="auth-btn" id="loginBtn">DISCORD LOGIN</a>
            
            <div class="user-profile" id="profileBadge">
                <div style="text-align: right;">
                    <div id="userName" style="font-weight: 700; font-size: 1.2rem; color: #fff;">İsim</div>
                    <div style="font-size: 0.8rem; color: var(--main); font-weight: 700;">YETKİLİ ERİŞİMİ</div>
                </div>
                <img src="" id="userAvatar">
            </div>
        </header>

        <div class="grid-container">
            <div class="esp-box">
                <div class="corner-tr"></div><div class="corner-bl"></div>
                <div class="stat-value" id="scriptCount">0</div>
                <div class="stat-label">Aktif Scriptler</div>
                <button class="key-action-btn" onclick="alert('Script listesi yakında eklenecek!')">GÖRÜNTÜLE <span class="arrow-transition">>></span></button>
            </div>

            <div class="esp-box" style="border-color: var(--main);">
                <div class="corner-tr"></div><div class="corner-bl"></div>
                <div class="stat-value"><i class="fa-solid fa-key"></i></div>
                <div class="stat-label" style="color: #fff;">Lisans Sistemi</div>
                <button class="key-action-btn" style="background: var(--main); color: #000;" onclick="fetchKeyFromMongoDB()">KEY SORGULA <span class="arrow-transition">>></span></button>
                <div id="mongoKeyResult"></div>
            </div>

            <div class="esp-box">
                <div class="corner-tr"></div><div class="corner-bl"></div>
                <div class="stat-value" style="color: #00ff00;">ONLINE</div>
                <div class="stat-label">Database Durumu</div>
                <p style="color: var(--sub); margin-top: 15px; font-weight: 600;">MongoDB Atlas Bağlantısı Aktif</p>
            </div>
        </div>
    </div>

    <script>
        let loggedInUserId = null;

        // DİL SEÇİMİ VE SİTEYE GİRİŞ
        function enterSite(lang) {
            const intro = document.getElementById('intro-screen');
            const main = document.getElementById('main-ui');
            
            intro.style.opacity = '0';
            intro.style.visibility = 'hidden';
            
            setTimeout(() => {
                intro.style.display = 'none';
                main.style.display = 'block';
                // Havalı fade in
                setTimeout(() => { main.style.opacity = '1'; }, 50);
                
                checkDiscordLogin();
                animateValue("scriptCount", 0, 14, 1500); // Havalı sayı sayma animasyonu
            }, 800);
        }

        // SAYI ANİMASYONU
        function animateValue(id, start, end, duration) {
            let obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        // DISCORD LOGIN KONTROLÜ
        async function checkDiscordLogin() {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            let token = fragment.get('access_token') || localStorage.getItem('d_token');
            let type = fragment.get('token_type') || localStorage.getItem('d_type');

            if (token) {
                localStorage.setItem('d_token', token);
                localStorage.setItem('d_type', type);
                window.history.replaceState(null, null, window.location.pathname);

                try {
                    const res = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `${type} ${token}` } });
                    const user = await res.json();

                    if (user.id) {
                        loggedInUserId = user.id;
                        document.getElementById('loginBtn').style.display = 'none';
                        document.getElementById('profileBadge').style.display = 'flex';
                        
                        const av = user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png';
                        document.getElementById('userAvatar').src = av;
                        document.getElementById('userName').innerText = user.username.toUpperCase();
                    }
                } catch(e) {
                    localStorage.clear();
                }
            }
        }

        // 🧠 HARBİ MONGODB'DEN KEY ÇEKME (KESİN ÇALIŞAN KOD)
        async function fetchKeyFromMongoDB() {
            const resultBox = document.getElementById('mongoKeyResult');
            
            if (!loggedInUserId) {
                resultBox.style.display = 'block';
                resultBox.style.color = '#ff3333';
                resultBox.style.borderColor = '#ff3333';
                resultBox.innerText = "HATA: ÖNCE DİSCORD İLE GİRİŞ YAPIN!";
                return;
            }

            resultBox.style.display = 'block';
            resultBox.style.color = 'var(--main)';
            resultBox.style.borderColor = 'var(--main)';
            resultBox.innerText = "MONGODB'YE BAĞLANILIYOR...";

            try {
                // Vercel'deki Backend'ine (api/user.js) istek atıyoruz!
                const response = await fetch(`/api/user?id=${loggedInUserId}`);
                
                if (!response.ok) throw new Error("API Yanıt Vermedi");
                
                const data = await response.json();

                if (data.key && data.key !== "SİSTEMDE KAYITLI KEY YOK") {
                    resultBox.innerText = data.key;
                    resultBox.style.color = '#00ff00'; // Başarılıysa yeşil olsun
                    resultBox.style.borderColor = '#00ff00';
                } else {
                    resultBox.innerText = "VERİTABANINDA KEY BULUNAMADI!";
                    resultBox.style.color = '#ff3333';
                    resultBox.style.borderColor = '#ff3333';
                }
            } catch (error) {
                resultBox.innerText = "BAĞLANTI HATASI: API DOSYASI BULUNAMADI!";
                resultBox.style.color = '#ff3333';
                resultBox.style.borderColor = '#ff3333';
            }
        }
    </script>
</body>
</html>
